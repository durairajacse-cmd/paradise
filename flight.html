<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage Air | Flight Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 1.5s ease; }
        .hidden { display: none; }
        .airplane-shape { border-radius: 120px 120px 30px 30px; }
        .seat { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .seat.available { background: #e2e8f0; border: 1px solid #cbd5e1; }
        .seat.selected { background: #2b2dbb; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); border: none; }
        .seat.occupied { background: #cbd5e1; cursor: not-allowed; opacity: 0.4; }
        .ticket-cut { position: relative; }
        .ticket-cut::before, .ticket-cut::after {
            content: ''; position: absolute; width: 40px; height: 40px; 
            background: #020617; border-radius: 50%; top: 50%; transform: translateY(-50%);
        }
        .ticket-cut::before { left: -20px; }
        .ticket-cut::after { right: -20px; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="page-1" class="fade-in">
        <nav class="bg-white border-b border-slate-200 py-5 px-10 flex justify-between items-center sticky top-0 z-50"> 
            <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">TRAVELLER<span class="text-slate-900">AIR</span></h1>
            <button class="bg-slate-100 px-5 py-2 rounded-full text-xs font-bold">My Trips</button>
        </nav>

        <header class="bg-indigo-600 py-16 px-6 text-center text-white">
            <h2 class="text-4xl font-extrabold mb-2">Select Your Flight</h2>
            <p class="opacity-80">London (LHR) <i class="fas fa-long-arrow-alt-right mx-2"></i> Dubai (DXB)</p>
        </header>

        <main class="max-w-5xl mx-auto -mt-10 px-6 pb-20 space-y-4">
            <script>
                const airlines = ["SkyLink", "Global Wings", "Emirates", "AirVoyage", "Qatar Airways", "Lufthansa", "British Air", "Delta", "Indigo", "Singapore Air"];
                for(let i=0; i<10; i++) {
                    document.write(`
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6 hover:shadow-xl transition-all group">
                        <div class="flex items-center gap-4 w-full md:w-1/4">
                            <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 font-black text-xl">${airlines[i][0]}</div>
                            <div><h4 class="font-extrabold text-slate-800">${airlines[i]}</h4><p class="text-[10px] font-bold text-slate-400 uppercase">VA-${100+i}</p></div>
                        </div>
                        <div class="flex-1 flex items-center justify-between w-full px-6">
                            <div class="text-center"><p class="text-xl font-black">10:30</p><p class="text-xs font-bold text-slate-400 uppercase">LHR</p></div>
                            <div class="flex-1 px-8 text-center"><p class="text-[10px] font-bold text-indigo-500 mb-1">DIRECT</p><div class="h-[2px] bg-slate-100 w-full relative"></div></div>
                            <div class="text-center"><p class="text-xl font-black">18:50</p><p class="text-xs font-bold text-slate-400 uppercase">DXB</p></div>
                        </div>
                        <div class="text-right w-full md:w-1/4 flex items-center justify-end gap-6">
                            <p class="text-2xl font-black">$${400 + (i*50)}</p>
                            <button onclick="goToPage2('${airlines[i]}', ${400 + (i*50)})" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-slate-900 transition-all">Book Now</button>
                        </div>
                    </div>
                    `);
                }
            </script>
        </main>
    </div>

    <div id="page-2" class="hidden h-screen flex flex-col bg-slate-950 text-white">
        <header class="p-6 bg-slate-900 flex justify-between items-center">
            <button onclick="location.reload()" class="text-slate-400 font-bold"><i class="fas fa-chevron-left mr-2"></i> Back</button>
            <h2 id="p2-airline" class="text-xl font-black text-indigo-400">Airline</h2>
            <p id="p2-price" class="text-2xl font-black">$0</p>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <div class="flex-1 overflow-y-auto p-12 flex justify-center bg-slate-950">
                <div class="airplane-shape bg-white w-80 p-10 relative shadow-2xl">
                    <div class="absolute -top-16 left-0 w-full h-32 bg-white rounded-t-full border-b-8 border-slate-50"></div>
                    <div class="space-y-6 mt-10">
                        <script>
                            for(let r=1; r<=10; r++) {
                                document.write(`
                                <div class="flex justify-between items-center">
                                    <div class="seat available" data-name="${r}A" onclick="selectSeat(this)"></div>
                                    <div class="seat available" data-name="${r}B" onclick="selectSeat(this)"></div>
                                    <span class="text-[10px] font-black text-slate-300 w-6 text-center">${r}</span>
                                    <div class="seat available" data-name="${r}C" onclick="selectSeat(this)"></div>
                                    <div class="seat available" data-name="${r}D" onclick="selectSeat(this)"></div>
                                </div>`);
                            }
                        </script>
                    </div>
                </div>
            </div>
            <div class="w-full md:w-96 bg-slate-900 p-8 flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold mb-4">Seat Details</h3>
                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
                        <p class="text-xs font-bold text-slate-500 uppercase mb-1">Selected</p>
                        <p id="seat-label" class="text-5xl font-black text-white">--</p>
                    </div>
                </div>
                <button onclick="goToPage3()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-500">Confirm & Pay</button>
            </div>
        </div>
    </div>

    <div id="page-3" class="hidden h-screen bg-slate-950 flex flex-col items-center justify-center p-6">
        <div class="bg-green-500 w-20 h-20 rounded-full flex items-center justify-center mb-8 shadow-lg shadow-green-500/30">
            <i class="fas fa-check text-4xl text-white"></i>
        </div>
        <h2 class="text-3xl font-black text-white mb-2">Booking Confirmed!</h2>
        <p class="text-slate-400 mb-10">Your tickets have been sent to your email.</p>

        <div class="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl fade-in text-slate-900">
            <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
                <p class="font-black text-xl tracking-tighter">VOYAGE AIR</p>
                <div class="text-right">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Booking ID</p>
                    <p id="conf-id" class="font-bold text-lg">#VA-992011</p>
                </div>
            </div>
            <div class="p-8 space-y-8">
                <div class="flex justify-between items-center">
                    <div><p class="text-xs font-bold text-slate-400 uppercase">Passenger</p><p class="font-black">John Doe</p></div>
                    <div class="text-right"><p class="text-xs font-bold text-slate-400 uppercase">Seat</p><p id="conf-seat" class="font-black text-indigo-600 text-xl">--</p></div>
                </div>
                <div class="flex justify-between items-center border-t border-b border-slate-100 py-6 ticket-cut">
                    <div><p class="text-2xl font-black">LHR</p><p class="text-xs font-bold text-slate-400">London</p></div>
                    <i class="fas fa-plane text-slate-200 text-xl"></i>
                    <div class="text-right"><p class="text-2xl font-black">DXB</p><p class="text-xs font-bold text-slate-400">Dubai</p></div>
                </div>
                <div class="flex justify-center flex-col items-center gap-4">
                    <div class="bg-slate-100 p-4 rounded-xl"><i class="fas fa-qrcode text-6xl"></i></div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Scan at Boarding Gate</p>
                </div>
            </div>
        </div>
        <button onclick="location.reload()" class="mt-10 text-indigo-400 font-bold hover:text-white transition underline">Back to Home</button>
    </div>

    <script>
        let flightData = { airline: '', price: 0, seat: '--' };

        function goToPage2(name, price) {
            flightData.airline = name;
            flightData.price = price;
            document.getElementById('page-1').classList.add('hidden');
            document.getElementById('page-2').classList.remove('hidden');
            document.getElementById('p2-airline').innerText = name + " Airways";
            document.getElementById('p2-price').innerText = "$" + price;
            document.body.style.background = "#020617";
        }

        function selectSeat(el) {
            document.querySelectorAll('.seat.selected').forEach(s => s.classList.replace('selected', 'available'));
            el.classList.replace('available', 'selected');
            flightData.seat = el.getAttribute('data-name');
            document.getElementById('seat-label').innerText = flightData.seat;
        }

        function goToPage3() {
            if(flightData.seat === '--') return alert("Select a seat first!");
            
            // Generate Random Booking ID
            const randomID = "VA-" + Math.floor(100000 + Math.random() * 900000);
            
            document.getElementById('page-2').classList.add('hidden');
            document.getElementById('page-3').classList.remove('hidden');
            document.getElementById('conf-id').innerText = "#" + randomID;
            document.getElementById('conf-seat').innerText = flightData.seat;
            document.body.style.background = "#020617";
        }
    </script>
</body>
</html>
