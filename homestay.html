<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homestays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* NEON-GLASS CARDS */
        .luxury-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .luxury-card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .img-wrapper {
            height: 220px;
            background: #1e293b;
            overflow: hidden;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        .img-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease, transform 1s ease;
        }

        .img-loaded img { opacity: 1; }
        .luxury-card:hover img { transform: scale(1.1); }

        /* VOUCHER STYLING */
        .voucher-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .perforated {
            border-top: 2px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            margin: 2rem 0;
        }
        .perforated::before, .perforated::after {
            content: ''; position: absolute; top: -11px;
            width: 22px; height: 22px; background: #020617; border-radius: 50%;
        }
        .perforated::before { left: -52px; }
        .perforated::after { right: -52px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <nav class="sticky top-0 z-40 p-6 bg-slate-950/80 backdrop-blur-xl border-b border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                <h1 class="text-2xl font-black italic tracking-tighter text-sky-400">TRAVELLER<span class="text-white">STAYS</span></h1>
                
                <div class="relative w-full max-w-xl group">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-sky-400/50"></i>
                    <input type="text" id="vSearch" onkeyup="filterVillas()" placeholder="Search 80+ Luxury Stays..." 
                           class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white focus:outline-none focus:border-sky-500">
                </div>

                <div class="bg-sky-500/10 text-sky-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-sky-500/20">
                    <span id="counter">80 Properties</span>
                </div>
            </div>
        </nav>

        <main class="max-w-[1500px] mx-auto px-8 py-12">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="villa-grid">
                </div>
        </main>
    </div>

    <div id="booking-confirmed" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="voucher-card p-10 w-full max-w-md text-center shadow-2xl">
            <div class="w-20 h-20 bg-sky-500 text-white rounded-full flex items-center justify-center mx-auto -mt-20 mb-6 shadow-lg">
                <i class="fas fa-check text-3xl"></i>
            </div>
            
            <h2 class="text-2xl font-black text-white mb-1 uppercase tracking-tighter">Booking Confirmed</h2>
            <p class="text-sky-400 font-bold text-[10px] uppercase tracking-[0.3em] mb-8">Your ticket is ready</p>

            <div class="text-left space-y-4 mb-2">
                <div>
                    <p class="text-[9px] text-white/40 uppercase font-black">Property</p>
                    <p id="res-name" class="text-white font-bold italic">--</p>
                </div>
                <div class="flex justify-between">
                    <div>
                        <p class="text-[9px] text-white/40 uppercase font-black">Booking ID</p>
                        <p class="text-white font-mono text-sm">#VS-88290</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-white/40 uppercase font-black">Status</p>
                        <p class="text-green-400 font-bold text-sm">Paid</p>
                    </div>
                </div>
            </div>

            <div class="perforated"></div>

            <div class="flex items-center justify-between mb-8">
                <div class="text-left">
                    <p class="text-[9px] text-white/40 uppercase font-black">Total Price</p>
                    <p id="res-price" class="text-3xl font-black text-white">$0</p>
                </div>
                <div class="bg-white p-2 rounded-lg"><i class="fas fa-qrcode text-slate-900 text-3xl"></i></div>
            </div>

            <button onclick="window.print()" class="w-full bg-sky-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-sky-500/20 mb-4 hover:bg-white hover:text-sky-600 transition-all">
                Download PDF
            </button>
            
            <button onclick="returnToDashboard()" class="w-full text-white/30 text-[10px] font-black uppercase hover:text-sky-400 transition-colors">
                Return to Dashboard
            </button>
        </div>
    </div>

    <script>
        const propertyPool = [
            { n: "Azure Bay Villa", i: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600" },
            { n: "Mountain Glass Cabin", i: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=600" },
            { n: "The Onyx Penthouse", i: "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600" },
            { n: "Sunset Serenity Homestay", i: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600" },
            { n: "Nordic Pine Estate", i: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=600" }
        ];

        function initGallery() {
            const grid = document.getElementById('villa-grid');
            for(let i=1; i<=80; i++) {
                const base = propertyPool[i % propertyPool.length];
                const title = base.n + " " + (1000 + i);
                const price = 199 + (i * 12);
                
                const card = document.createElement('div');
                card.className = "luxury-card";
                card.setAttribute('data-title', title.toLowerCase());
                card.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${base.i}&sig=${i}" onload="this.parentElement.classList.add('img-loaded')">
                    </div>
                    <div class="p-8">
                        <h3 class="text-white font-black text-lg mb-1 truncate">${title}</h3>
                        <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest mb-6">Luxury Stay • 4 Guest</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black text-sky-400">$${price}</span>
                            <button onclick="confirmBooking('${title}', '${price}')" class="bg-white/5 border border-white/10 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-sky-500 transition-all">Book</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function filterVillas() {
            const q = document.getElementById('vSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.luxury-card');
            let count = 0;
            cards.forEach(c => {
                if(c.getAttribute('data-title').includes(q)) {
                    c.classList.remove('hidden');
                    count++;
                } else {
                    c.classList.add('hidden');
                }
            });
            document.getElementById('counter').innerText = `${count} Properties`;
        }

        function confirmBooking(name, price) {
            document.getElementById('res-name').innerText = name;
            document.getElementById('res-price').innerText = "$" + price;
            document.getElementById('booking-confirmed').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#38bdf8', '#ffffff']
            });
        }

        function returnToDashboard() {
            // Hides the overlay and brings back the dashboard
            document.getElementById('booking-confirmed').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('vSearch').value = '';
            filterVillas();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = initGallery;
    </script>
</body>
</html>
